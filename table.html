<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table{
            width:100%;
            border-collapse: collapse;
            text-align: center;
            color: #130707;
        }
        td,th{
            border: 1px solid black;
            padding: 10px;
        }
        tr:nth-child(even){
            background-color: #8c8686;
        }
    </style>
</head>
<body>
     <table>
        <tr>
            <th>Country</th>
            <th>country Code</th>
            <th>Email</th>
        </tr>
    <tr>
        <td>India</td>
        <td>IN</td>
        <td>india@google.com</td>
    </tr>
    <tr>
        <td>United States Of america</td>
        <td>USA</td>
        <td>usa@google.com</td>
    </tr>
<tr>
    <td>Japan</td>
    <td>JP</td>
    <td>jp@google.com</td>
</tr>
    <tr>
        <td>china</td>
        <td>CN</td>
        <td>Cn@google.com</td>
    </tr>
</table> 
</body>
</html>
