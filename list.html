<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <h3>this is my list</h3>
    <h3>Unordered list</h3>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ul>
    <h3>ordered list</h3>
    <ol type="I">
        <li>one</li>
        <li>two</li>
        <li>three</li>
    </ol>
    <h3>nested lsit</h3>
    <ul>
        <li>1
            <ol type="i">
                <li>L.1</li>
                <li>L.2</li>
            </ol>
        </li>
        <li>2</li>
        <li>3</li>
    </ul>
    <h3>data list</h3>
    <dl>
        <dt>Tea</dt>
        <dd>Ginger tea</dd>
    </dl>
    <h3>test 1</h3>
    <p>test 2</p>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Repudiandae,<span>test3</span> eos.</p>
</body>
</html>
