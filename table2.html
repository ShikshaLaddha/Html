<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
    <style>
        table{
            width:100%;
            border-collapse: collapse;
            text-align: center;
            color: #130707;
        }
        td,th{
            border: 1px solid black;
            padding: 10px;
        }
        tr{
            background-color: #8c8686;
        }
    </style>
</head>
<body>
     <table>
        <tr>
            <th colspan="3">Country</th>
            <td>India</td>
            <td>Japan</td>
        </tr>
    <tr>
        <th>Code</th>
        <td>IN</td>
        <td>JP</td>
    </tr>
</table> 
</body>
</html>
